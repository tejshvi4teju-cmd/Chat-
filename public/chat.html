<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; font-family:Arial; background:#ece5dd; }

#topBar { background:lavender; padding:10px; }

#users { font-size:12px; }
#status { font-size:12px; color:gray; }

#messages {
    list-style:none;
    padding:10px;
    height:70vh;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
}

.message { max-width:70%; margin:6px; padding:8px; border-radius:10px; }

.me { background:#dcf8c6; align-self:flex-end; }
.other { background:white; align-self:flex-start; }

.sender { font-size:12px; font-weight:bold; }
.time { font-size:10px; text-align:right; color:gray; }

#inputArea { display:flex; padding:10px; background:white; }
#msg { flex:1; padding:10px; }
</style>
</head>

<body>

<div id="topBar">
    Chat Room
    <div id="users"></div>
    <div id="status"></div>
</div>

<ul id="messages"></ul>

<div id="inputArea">
    <input id="msg" placeholder="Type message">
    <button onclick="send()">Send</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
